services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: deckwatch
      POSTGRES_PASSWORD: deckwatch
      POSTGRES_DB: deckwatch
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deckwatch"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://deckwatch:deckwatch@db:5432/deckwatch
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  dbdata:
